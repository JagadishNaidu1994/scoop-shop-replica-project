[build]
  # Build command to install dependencies and build the project
  command = "npm install && npm run build"

  # Publish directory - where the build outputs (dist at root level)
  publish = "dist"

  # No base directory - project is at root level (overrides UI settings)
  base = "."

# Node version (optional but recommended for consistency)
[build.environment]
  NODE_VERSION = "20"

# Redirect rules for SPA (single page application)
# This ensures all routes work correctly with React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
